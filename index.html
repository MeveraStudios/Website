<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mevera Docs</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mevera Docs" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <script>
    // GitHub Pages SPA redirect restore
    // 404.html redirects to /?p=<encoded-path>
    // This script restores the real URL before React loads.
    (function () {
      var params = new URLSearchParams(window.location.search);
      var p = params.get('p');
      if (p) {
        var h = params.get('h') || '';
        window.history.replaceState(null, null, p + h);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
