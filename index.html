<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mevera Docs</title>
    <script>
      // GitHub Pages SPA redirect restore
      // 404.html redirects to /?p=<encoded-path>
      // This script restores the real URL before React loads.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var h = params.get('h') || '';
          window.history.replaceState(null, null, p + h);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
